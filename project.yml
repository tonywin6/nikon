name: NikonConnectIOS

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: 6P3T8J877R
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

targets:
  NikonConnectIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Domain
      - path: Features
      - path: Services
      - path: Infrastructure
      - path: Resources/Assets.xcassets
    dependencies:
      - target: DownloadActivityWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjunhao.NikonConnectIOS
        PRODUCT_NAME: Nikon Connect
        PRODUCT_MODULE_NAME: NikonConnectIOS
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    scheme:
      testTargets:
        - NikonConnectIOSTests

  DownloadActivityWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: DownloadActivityWidget
      - path: Domain/DownloadActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjunhao.NikonConnectIOS.DownloadActivityWidget
        PRODUCT_NAME: DownloadActivityWidget
        PRODUCT_MODULE_NAME: DownloadActivityWidget
        INFOPLIST_FILE: DownloadActivityWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        APPLICATION_EXTENSION_API_ONLY: YES
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"

  NikonConnectIOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: NikonConnectIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjunhao.NikonConnectIOSTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nikon Connect.app/Nikon Connect"
